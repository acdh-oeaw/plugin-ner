name: Deploy to Trigger.dev (self-hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      # Docker setup
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: 🚀 Deploy Trigger.dev
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
          TRIGGER_API_URL: ${{ vars.TRIGGER_API_URL }}
          TRIGGER_SERVER_URL: ${{ vars.TRIGGER_SERVER_URL }}
        run: |
          sed -i 's|proj_fyeypkhgyaejpiweobwq|proj_detlmirwqqmzxiwbjkht|g' ./src/trigger.config.ts
          sudo apt-get update && sudo apt-get install -y util-linux
          script -q -e -c "bash -c 'npx trigger.dev@4.4.6 login -a $TRIGGER_SERVER_URL --profile self-hosted'"
          echo y | script -q -e -c "bash -c 'npx trigger.dev@4.4.6 deploy --env staging --profile self-hosted --push -c ./src/trigger.config.ts'"
