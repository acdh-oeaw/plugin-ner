name: Deploy Trigger Tasks

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --include=dev

      - name: Upgrade Trigger.dev packages
        run: |
          npm install @trigger.dev/sdk@4.4.6
          npm install @trigger.dev/build@4.4.6 --save-dev

      - name: Verify Trigger versions
        run: |
          npm ls @trigger.dev/sdk || true
          npm ls @trigger.dev/build || true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Patch Project ID
        run: |
          sed -i 's|proj_fyeypkhgyaejpiweobwq|proj_detlmirwqqmzxiwbjkht|g' ./src/trigger.config.ts

      - name: Deploy to Trigger.dev (Self-Hosted)
        env:
          TRIGGER_API_URL: ${{ vars.TRIGGER_API_URL }}
          TRIGGER_SERVER_URL: ${{ vars.TRIGGER_SERVER_URL }}
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
        run: |
          npx -y trigger.dev@4.4.6 login \
            -a "$TRIGGER_SERVER_URL" \
            --profile self-hosted

          npx -y trigger.dev@4.4.6 deploy \
            --env staging \
            --profile self-hosted \
            --push \
            -c ./src/trigger.config.ts
